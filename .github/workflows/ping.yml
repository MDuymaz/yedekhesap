name: Ping
on:
  schedule:
    - cron: "* */3 * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: 5 saat boyunca her 10 dakikada bir ping at (19:00–23:00 arası cache atlama)
        env:
          
          PINGURL_1: ${{ secrets.PINGURL_1 }}
          PING_XTREAM1: ${{ secrets.PING_XTREAM1 }}
          PING_CLEAR_CACHE_PROXY: ${{ secrets.PING_CLEAR_CACHE_PROXY }}
          
        run: |
          # jq yoksa yükle
          if ! command -v jq &> /dev/null; then
            echo "jq yükleniyor..."
            sudo apt-get update && sudo apt-get install -y jq
          fi

          END_TIME=$((SECONDS + 5 * 60 * 60))

          while [ $SECONDS -lt $END_TIME ]; do
            # Normal URL ping
            for URL_NAME in PINGURL_1 PING_XTREAM1; do
              URL=${!URL_NAME}
              echo "🔄 $URL_NAME için ping atılıyor: $URL - $(date '+%Y-%m-%d %H:%M:%S' -u)"
              
              HTML=$(curl -s "$URL")
              TEXT=$(echo "$HTML" | grep -oP '(?<=<h1>).*?(?=</h1>)')

              if [[ -z "$TEXT" ]]; then
                echo "❌ $URL_NAME sistemi pasif olabilir!"
              else
                echo "✅ $URL_NAME: $TEXT"
              fi
            done

            echo "⏳ 10 dakika bekleniyor..."
            sleep 600
          done

          echo "✅ 5 saatlik normal ping işlemleri tamamlandı."

          # Türkiye saati (GMT+3)
          CURRENT_HOUR=$(TZ="Europe/Istanbul" date +%H)

          if (( 19 <= 10#$CURRENT_HOUR && 10#$CURRENT_HOUR < 23 )); then
            echo "🕖 Şu an Türkiye saatiyle $CURRENT_HOUR:00 — cache ping atlanıyor."
          else
            echo "🕘 Cache ping zamanı — Türkiye saatiyle $CURRENT_HOUR:00"

            for CACHE_NAME in PING_CLEAR_CACHE_PROXY ; do
              CACHE_URL=${!CACHE_NAME}
              echo "🔄 $CACHE_NAME cache ping atılıyor: $CACHE_URL - $(date '+%Y-%m-%d %H:%M:%S' -u)"
              
              CACHE_HTML=$(curl -s "$CACHE_URL")
              CACHE_TEXT=$(echo "$CACHE_HTML" | jq -r '.message')

              if [[ -z "$CACHE_TEXT" || "$CACHE_TEXT" == "null" ]]; then
                echo "❌ $CACHE_NAME cache sistemi pasif olabilir!"
              else
                echo "✅ $CACHE_NAME cache: $CACHE_TEXT"
              fi
            done
          fi
